server {
    listen 80;
    client_max_body_size 12M;

    location /api/ { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /admin/ { proxy_pass http://backend:8000; proxy_set_header Host $host; }
    location /static/ { proxy_pass http://backend:8000; }
    location /media/ { proxy_pass http://backend:8000; }
    location / { proxy_pass http://frontend:5173; proxy_set_header Host $host; }
}
